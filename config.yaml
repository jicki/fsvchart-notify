server:
  address: "0.0.0.0"
  port: 8080

auth:
  jwt_secret: "fsvchart-notify-secret-key"
  token_expiry_hours: 24
  ldap:
    enabled: false
    host: "ldap.example.com"
    port: 389
    use_tls: false
    bind_dn: "cn=admin,dc=example,dc=com"
    bind_password: ""
    base_dn: "ou=users,dc=example,dc=com"
    user_filter: "(uid=%s)"
    display_name_attr: "cn"
    email_attr: "mail"
    default_role: "user"
